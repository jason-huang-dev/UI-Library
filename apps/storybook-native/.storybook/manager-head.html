<style>
  .jason-ui-web-docs-link {
    align-items: center;
    background: #f7f4ee;
    border: 1px solid #d8cfbf;
    border-radius: 6px;
    color: #1f1f1f;
    display: inline-flex;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 600;
    gap: 6px;
    line-height: 1;
    padding: 7px 10px;
    position: fixed;
    right: 16px;
    text-decoration: none;
    top: 10px;
    z-index: 9999;
  }

  .jason-ui-web-docs-link:focus-visible {
    outline: 2px solid #1d6f99;
    outline-offset: 2px;
  }
</style>
<script>
  window.addEventListener("DOMContentLoaded", function () {
    if (document.querySelector(".jason-ui-web-docs-link")) {
      return;
    }

    var link = document.createElement("a");
    link.className = "jason-ui-web-docs-link";
    link.href = "/";
    link.textContent = "Web Storybook";
    document.body.appendChild(link);
  });
</script>
