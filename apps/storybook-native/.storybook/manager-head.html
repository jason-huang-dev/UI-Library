<style>
  .jason-storybook-switcher {
    align-items: center;
    display: inline-flex;
    gap: 6px;
    position: fixed;
    right: 16px;
    top: 10px;
    z-index: 9999;
  }

  .jason-storybook-switcher a {
    align-items: center;
    background: #f7f4ee;
    border: 1px solid #d8cfbf;
    border-radius: 6px;
    color: #1f1f1f;
    display: inline-flex;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    padding: 7px 10px;
    text-decoration: none;
  }

  .jason-storybook-switcher a[aria-current="page"] {
    background: #1f1f1f;
    border-color: #1f1f1f;
    color: #f7f4ee;
  }

  .jason-storybook-switcher a:focus-visible {
    outline: 2px solid #1d6f99;
    outline-offset: 2px;
  }
</style>
<script>
  window.addEventListener("DOMContentLoaded", function () {
    if (document.querySelector(".jason-storybook-switcher")) {
      return;
    }

    var nav = document.createElement("nav");
    nav.className = "jason-storybook-switcher";
    nav.setAttribute("aria-label", "Storybook switcher");

    var path = window.location.search;
    var isVynora = path.indexOf("vynora-") !== -1;

    [
      { href: "/", label: "Web" },
      { href: "/native/", label: "Native", current: !isVynora },
      {
        href: "/native/?path=/docs/vynora-playingcard--docs",
        label: "Vynora",
        current: isVynora
      },
      { href: "/native-web/", label: "Native preview" }
    ].forEach(function (item) {
      var link = document.createElement("a");
      link.href = item.href;
      link.textContent = item.label;

      if (item.current) {
        link.setAttribute("aria-current", "page");
      }

      nav.appendChild(link);
    });

    document.body.appendChild(nav);
  });
</script>
